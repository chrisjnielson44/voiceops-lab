# Better Auth host. Deploy: flyctl deploy  (override app per env with --app).
# Secrets (flyctl secrets set ...): BETTER_AUTH_SECRET, BETTER_AUTH_URL (public
# SPA origin), DATABASE_URL_UNPOOLED, BETTER_AUTH_TRUSTED_ORIGINS, AUTH_CORS_ORIGINS.
app = "voiceops-auth"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  AUTH_PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "get"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
