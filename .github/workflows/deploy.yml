name: Deploy

# main -> production, develop -> staging. Fly apps are suffixed for staging
# (voiceops-api-staging / voiceops-auth-staging). Secrets live in GitHub
# Environments (production / staging): FLY_API_TOKEN, VERCEL_TOKEN,
# VERCEL_ORG_ID, VERCEL_PROJECT_ID.
on:
  push:
    branches: [main, develop]

concurrency: deploy-${{ github.ref }}

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Backend lint, audit, and tests
        working-directory: backend
        run: |
          pip install ".[dev]"
          ruff check .
          pip-audit --skip-editable .
          python -m pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            auth-server/package-lock.json
            web/package-lock.json
      - name: Auth dependency audit
        working-directory: auth-server
        run: |
          npm ci
          npm audit --audit-level=moderate
      - name: Web lint, audit, tests, and build
        working-directory: web
        run: |
          npm ci
          npm run lint
          npm run audit
          npm run typecheck
          npm run test
          npm run build

  fly:
    name: Deploy auth + backend (Fly.io)
    needs: quality
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_AUTH_APP: ${{ github.ref == 'refs/heads/main' && 'voiceops-auth' || 'voiceops-auth-staging' }}
      FLY_API_APP: ${{ github.ref == 'refs/heads/main' && 'voiceops-api' || 'voiceops-api-staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy auth-server
        working-directory: auth-server
        run: flyctl deploy --remote-only --app "$FLY_AUTH_APP"
      - name: Deploy backend
        working-directory: backend
        run: flyctl deploy --remote-only --app "$FLY_API_APP"

  web:
    name: Deploy SPA (Vercel)
    needs: quality
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm install -g vercel@54.2.0
      - name: Build then deploy prebuilt artifact
        working-directory: web
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
            vercel build --prod --token "$VERCEL_TOKEN"
            vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"
          else
            vercel pull --yes --environment=preview --token "$VERCEL_TOKEN"
            vercel build --token "$VERCEL_TOKEN"
            vercel deploy --prebuilt --yes --token "$VERCEL_TOKEN"
          fi
