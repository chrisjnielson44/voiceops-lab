name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    name: backend (lint + audit + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ".[dev]"
      - run: ruff check .
      - run: pip-audit --skip-editable .
      - run: python -m pytest -q

  auth:
    name: auth-server (audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: auth-server/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=moderate

  web:
    name: web (lint + audit + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run audit
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  e2e:
    name: web e2e (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # webServer (playwright.config.ts) builds with VITE_PREVIEW_BYPASS=1 and
      # serves via `vite preview` — no backend/DB needed.
      - run: npm run e2e
