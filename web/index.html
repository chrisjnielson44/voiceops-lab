<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0b" />
    <!-- Geist — a modern, technical typeface (sans + mono). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Voice Labs — Voice-Agent Sandbox</title>
    <meta
      name="description"
      content="Model-agnostic healthcare voice-agent operations platform: orchestration, hosted/local routing, simulated payer calls, predictive modeling, audit, analytics, and benchmarks."
    />
    <!-- Blocking theme script: set the .dark class before first paint (no FOUC). Mirrors themeInitScript in ThemeProvider.tsx. -->
    <script>
      (function () {
        try {
          var k = "voiceops-theme";
          var s = localStorage.getItem(k) || "dark";
          var d = s === "dark" || (s === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var r = document.documentElement;
          r.classList.toggle("dark", d);
          r.style.colorScheme = d ? "dark" : "light";
        } catch (e) {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
    <!-- Blocking accent script: apply data-accent before first paint (no FOUC). -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("voiceops-accent") || "purple";
          var a = ["purple","blue","green","amber","rose","orange"].indexOf(raw) !== -1 ? raw : "purple";
          document.documentElement.setAttribute("data-accent", a);
        } catch (e) {
          document.documentElement.setAttribute("data-accent", "purple");
        }
      })();
    </script>
  </head>
  <body class="min-h-screen bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
