<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1120" height="680" fill="#ffffff"/>
  <rect x="0" y="0" width="1120" height="6" fill="#7c3aed"/>

  <text x="42" y="52" font-size="26" font-weight="700"><tspan fill="#7c3aed">VoiceLabs</tspan><tspan fill="#0f172a"> — the context graph</tspan></text>
  <text x="44" y="78" font-size="13.5" fill="#64748b">A foreign-key-derived knowledge graph, built once per call from the same tables the agent's tools read.</text>

  <!-- edges (drawn first, under nodes) -->
  <g stroke="#cbd5e1" stroke-width="1.8" fill="none">
    <line x1="470" y1="320" x2="332" y2="162" marker-end="url(#arrow)"/>            <!-- member -> payer -->
    <line x1="475" y1="372" x2="332" y2="494" marker-end="url(#arrow)"/>            <!-- member -> provider -->
    <line x1="458" y1="332" x2="334" y2="330" marker-end="url(#arrow)"/>            <!-- member -> auth -->
    <line x1="622" y1="318" x2="700" y2="212" marker-end="url(#arrow)"/>            <!-- member -> coverage -->
    <line x1="624" y1="342" x2="638" y2="342" marker-end="url(#arrow)"/>            <!-- member -> claim -->
    <line x1="600" y1="372" x2="700" y2="476" marker-end="url(#arrow)"/>            <!-- member -> note -->
    <line x1="812" y1="182" x2="898" y2="182" marker-end="url(#arrow)"/>            <!-- coverage -> plan -->
    <line x1="812" y1="344" x2="878" y2="348" marker-end="url(#arrow)"/>            <!-- claim -> carc -->
    <path d="M332,500 C470,580 560,420 640,372" marker-end="url(#arrow)"/>          <!-- provider -> claim -->
  </g>

  <!-- edge labels are drawn below, on top of the nodes -->

  <!-- nodes -->
  <!-- member (focal) -->
  <rect x="380" y="300" width="160" height="70" rx="13" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="460" y="332" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">member</text>
  <text x="460" y="352" text-anchor="middle" font-size="10.5" fill="#7c3aed">focus · PHI anchor</text>

  <rect x="180" y="120" width="150" height="56" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="255" y="153" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">payer</text>

  <rect x="180" y="470" width="150" height="56" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="255" y="503" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">provider</text>

  <rect x="184" y="302" width="150" height="56" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="259" y="335" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">auth</text>

  <rect x="640" y="152" width="172" height="60" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="726" y="180" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">coverage</text>
  <text x="726" y="198" text-anchor="middle" font-size="10" fill="#64748b">copays · deductible · OOP</text>

  <rect x="900" y="154" width="150" height="56" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="975" y="187" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">plan</text>

  <rect x="640" y="312" width="172" height="60" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="726" y="340" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">claim</text>
  <text x="726" y="358" text-anchor="middle" font-size="10" fill="#64748b">status · CPT · billed</text>

  <rect x="878" y="320" width="172" height="56" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="964" y="345" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">carc</text>
  <text x="964" y="362" text-anchor="middle" font-size="10" fill="#b91c1c">denial code</text>

  <rect x="640" y="470" width="210" height="56" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="745" y="494" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">note</text>
  <text x="745" y="512" text-anchor="middle" font-size="10" fill="#92702a">recorded on the call · working memory</text>

  <!-- edge labels (white halo, drawn on top of nodes for legibility) -->
  <g font-size="10.5" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#475569" paint-order="stroke" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round" text-anchor="middle">
    <text x="401" y="238">COVERED_BY · hub</text>
    <text x="403" y="438">SEEN_BY · hub</text>
    <text x="357" y="328">HAS_AUTH</text>
    <text x="658" y="262">HAS_COVERAGE</text>
    <text x="590" y="336">HAS_CLAIM</text>
    <text x="642" y="430">NOTED</text>
    <text x="848" y="176">ON_PLAN</text>
    <text x="845" y="334">DENIED_FOR</text>
    <text x="470" y="520">SUBMITTED</text>
  </g>

  <!-- caption -->
  <rect x="80" y="588" width="960" height="68" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="560" y="614" text-anchor="middle" font-size="12" fill="#334155">Built once per call from the SAME tables the tools read — so injected context can never contradict a tool result.</text>
  <text x="560" y="636" text-anchor="middle" font-size="12" fill="#334155">Hub edges (COVERED_BY · ON_PLAN · SEEN_BY) carry low weight, so a shared hub can't bridge into another member's PHI.</text>
</svg>
